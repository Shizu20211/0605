<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" id="btn"></button>
    <script>
        // 函式
        //1.有名稱的（具名函式）
        function 名稱(){
           //一開始先把內容計畫好，以便多處要使用時可以用
        }

        //2.沒有名稱的（匿名函式）
        btn.addEventListener('click',function(){
            //當下即刻執行
        })

        //3.簡化要寫很長的東西（箭頭函式）
        // 箭頭函式不會有名字forEach,map
    </script>
    
</body>
</html>
